{% extends 'core/base.html' %}

{% block title %}Home{% endblock %}

{% block content %}
    <h1>Welcome to my Django Blog!</h1>
    
    {% for post in posts %}
        <article>
            <h2><a href="{% url 'post_detail' pk=post.pk %}">{{ post.title }}</a></h2>
            <p>{{ post.content }}</p>
        </article>
        <hr>
    {% endfor %}
{% endblock %}
